<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MovilCenterStore</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <script src="js/productos.js" defer></script>
  <style>
    /* Fondo general en todo el body */
    body {
      background-image: url('img/Fondo_general.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
    }

    /* Fondo con imagen para el encabezado */
    header {
      background-image: url('img/Fondo_Menu.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      padding: 60px 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 500;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5); /* Oscurecer */
      z-index: 0;
    }

    header * {
      position: relative;
      z-index: 1;
    }

    /* Fondo blanco para contenido central */
    .contenedor-blanco {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 12px;
      max-width: 1200px;
      margin: 20px auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body onload="mostrarCatalogo(); actualizarMenu();">
  <header>
    <h1>MovilCenterStore</h1>
    <nav id="menuPrincipal">
      <!-- El contenido del menú se actualiza dinámicamente con JS -->
    </nav>
  </header>

  <main class="contenedor-blanco">
    <h2 style="text-align: center;">Catálogo de Productos</h2>
    <div id="catalogo" class="catalogo"></div>
  </main>

  <footer>
    <p>&copy; 2025 MovilCenterStore</p>
  </footer>

  <script>
    function actualizarMenu() {
      const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const totalProductos = carrito.reduce((total, item) => total + item.cantidad, 0);
      const carritoTexto = `Carrito 🛒${totalProductos > 0 ? ` (${totalProductos})` : ""}`;
      const menu = document.getElementById("menuPrincipal");

      if (usuario) {
        menu.innerHTML = `
          <a href="index.html">Inicio</a> |
          <a href="busqueda.html">Búsqueda Básica</a> |
          <a href="busqueda-avanzada.html">Búsqueda Avanzada</a> |
          <a href="carrito.html">${carritoTexto}</a> |
          <span>👤 ${usuario.nombre}</span> |
          <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
        `;
      } else {
        menu.innerHTML = `
          <a href="index.html">Inicio</a> |
          <a href="busqueda.html">Búsqueda Básica</a> |
          <a href="busqueda-avanzada.html">Búsqueda Avanzada</a> |
          <a href="registro.html">Registro / Iniciar sesión</a>
        `;
      }
    }

    function cerrarSesion() {
      localStorage.removeItem("usuarioLogueado");
      alert("Sesión cerrada exitosamente.");
      location.reload();
    }

    function mostrarCatalogo() {
      const contenedor = document.getElementById("catalogo");
      contenedor.innerHTML = "";

      fetch("http://localhost:3000/api/productos")
        .then(res => res.json())
        .then(productos => {
          if (!productos || productos.length === 0) {
            contenedor.innerHTML = "<p style='text-align:center;'>No hay productos disponibles en este momento.</p>";
            return;
          }

          localStorage.setItem("productos", JSON.stringify(productos));

          productos.forEach((producto) => {
            const card = document.createElement("div");
            card.className = "producto";
            card.innerHTML = `
              <img src="${producto.imagen}" alt="${producto.nombre}" onclick="verDetalle(${producto.id})" />
              <h3>${producto.nombre}</h3>
              <p><strong>Precio:</strong> $${producto.precio}</p>
              <p><strong>Stock:</strong> ${producto.stock}</p>
              <button class="boton" onclick="agregarAlCarrito(${producto.id})">Agregar al carrito</button>
            `;
            contenedor.appendChild(card);
          });
        })
        .catch(error => {
          console.error("Error al obtener productos del backend:", error);
          contenedor.innerHTML = "<p>Error al cargar los productos.</p>";
        });
    }

    function verDetalle(id) {
      window.location.href = `detalle.html?id=${id}`;
    }

    async function agregarAlCarrito(id, cantidad = 1) {
      const usuario = localStorage.getItem("usuarioLogueado");

      if (!usuario) {
        localStorage.setItem("productoPendiente", JSON.stringify({ id, cantidad }));
        localStorage.setItem("reagregarDesdeLogin", "true");
        alert("Debes iniciar sesión para agregar productos al carrito.");
        window.location.href = "registro.html";
        return;
      }

      try {
        const respuesta = await fetch(`http://localhost:3000/api/productos/${id}`);
        if (!respuesta.ok) throw new Error("Producto no encontrado");

        const producto = await respuesta.json();

        if (producto.stock < cantidad) {
          alert("❌ No hay suficiente stock disponible.");
          return;
        }

        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const index = carrito.findIndex(item => item.id === id);

        if (index >= 0) {
          const nuevaCantidad = carrito[index].cantidad + cantidad;
          if (nuevaCantidad > producto.stock) {
            alert("❌ Has alcanzado el límite del stock disponible.");
            return;
          }
          carrito[index].cantidad = nuevaCantidad;
        } else {
          carrito.push({ ...producto, cantidad });
        }

        localStorage.setItem("carrito", JSON.stringify(carrito));
        alert("✅ Producto agregado al carrito");
        actualizarMenu();

      } catch (error) {
        console.error("Error al agregar producto:", error);
        alert("❌ Error al procesar la solicitud. Intenta más tarde.");
      }
    }
  </script>
</body>
</html>
