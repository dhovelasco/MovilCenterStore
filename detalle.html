<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Detalle del Producto</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background-image: url('img/Fondo_general.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
    }

    header {
      background-image: url('img/Fondo_Menu.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      padding: 60px 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 500;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    header * {
      position: relative;
      z-index: 1;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 500;
    }

    .contenedor-blanco {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 12px;
      max-width: 800px;
      margin: 40px auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    footer {
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      margin-top: 40px;
    }

    .detalle-producto img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .boton {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.3s ease;
    }

    .boton:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body onload="cargarDetalle(); actualizarMenu();">
  <header>
    <h1>Detalle del Producto</h1>
    <nav id="menuPrincipal"></nav>
  </header>

  <main class="contenedor-blanco">
    <a href="index.html" class="boton" style="margin-bottom: 20px;">← Volver al Inicio</a>
    <div id="detalleProducto" class="detalle-producto"></div>
  </main>

  <footer>
    <p>&copy; 2025 MovilCenterStore</p>
  </footer>

  <script>
    function actualizarMenu() {
      const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const totalProductos = carrito.reduce((acc, item) => acc + item.cantidad, 0);
      const carritoTexto = `Carrito 🛒${totalProductos > 0 ? ` (${totalProductos})` : ""}`;
      const menu = document.getElementById("menuPrincipal");

      if (usuario) {
        menu.innerHTML = `
          <a href="index.html">Inicio</a> |
          <a href="busqueda.html">Búsqueda Básica</a> |
          <a href="busqueda-avanzada.html">Búsqueda Avanzada</a> |
          <a href="carrito.html">${carritoTexto}</a> |
          <span>👤 ${usuario.nombre}</span> |
          <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
        `;
      } else {
        menu.innerHTML = `
          <a href="index.html">Inicio</a> |
          <a href="busqueda.html">Búsqueda Básica</a> |
          <a href="busqueda-avanzada.html">Búsqueda Avanzada</a> |
          <a href="registro.html">Registro / Iniciar sesión</a>
        `;
      }
    }

    function cerrarSesion() {
      localStorage.removeItem("usuarioLogueado");
      alert("Sesión cerrada exitosamente.");
      location.reload();
    }

    function cargarDetalle() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const contenedor = document.getElementById("detalleProducto");

      if (!id) {
        contenedor.innerHTML = "<p>Producto no especificado.</p>";
        return;
      }

      fetch(`http://localhost:3000/api/productos/${id}`)
        .then(res => res.json())
        .then(producto => {
          contenedor.innerHTML = `
            <img src="${producto.imagen}" alt="${producto.nombre}" />
            <h2>${producto.nombre}</h2>
            <p><strong>Marca:</strong> ${producto.marca || "Sin marca"}</p>
            <p><strong>Precio:</strong> $${parseInt(producto.precio).toLocaleString()}</p>
            <p><strong>Stock:</strong> ${producto.stock}</p>
            <p><strong>Descripción:</strong> ${producto.descripcion}</p>
            <p><strong>Categoría:</strong> ${producto.categoria}</p>
            <button class="boton" onclick="agregarAlCarrito(${producto.id})">Agregar al carrito</button>
          `;
        })
        .catch(error => {
          contenedor.innerHTML = "<p>Error al cargar el producto.</p>";
          console.error("Error al obtener el producto:", error);
        });
    }

    function agregarAlCarrito(id) {
      const usuario = localStorage.getItem("usuarioLogueado");
      if (!usuario) {
        localStorage.setItem("productoPendiente", JSON.stringify({ id, cantidad: 1 }));
        localStorage.setItem("reagregarDesdeLogin", "true");
        alert("Debes iniciar sesión para agregar productos al carrito.");
        window.location.href = "registro.html";
        return;
      }

      fetch(`http://localhost:3000/api/productos/${id}`)
        .then(res => res.json())
        .then(producto => {
          if (producto.stock < 1) {
            alert("❌ No hay stock disponible para este producto.");
            return;
          }

          const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
          const index = carrito.findIndex(item => item.id === id);

          if (index >= 0) {
            const nuevaCantidad = carrito[index].cantidad + 1;
            if (nuevaCantidad > producto.stock) {
              alert("❌ Has alcanzado el límite del stock disponible.");
              return;
            }
            carrito[index].cantidad = nuevaCantidad;
          } else {
            carrito.push({ ...producto, cantidad: 1 });
          }

          localStorage.setItem("carrito", JSON.stringify(carrito));
          alert("✅ Producto agregado al carrito");
          actualizarMenu();
        })
        .catch(() => {
          alert("No se pudo agregar el producto al carrito.");
        });
    }
  </script>
</body>
</html>
