<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background-image: url('img/Fondo_general.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
    }

    header {
      background-image: url('img/Fondo_Menu.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      padding: 60px 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 500;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    header * {
      position: relative;
      z-index: 1;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 500;
    }

    .contenedor-blanco {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 12px;
      max-width: 1200px;
      margin: 30px auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    footer {
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      margin-top: 40px;
    }

    .acciones {
      text-align: center;
      margin-top: 20px;
    }

    .producto-carrito {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px;
      border-bottom: 1px solid #ccc;
    }

    .producto-carrito img {
      width: 100px;
      height: auto;
    }

    .boton {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      background-color: #3498db;
      color: white;
    }

    .boton:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body onload="mostrarCarrito(); mostrarMenuUsuario();">
  <header>
    <h1>Carrito de Compras</h1>
    <nav>
      <a href="index.html">Inicio</a> |
      <span id="menuOpciones"></span>
      <span id="menuUsuario"><a href="registro.html">Registro / Iniciar sesión</a></span>
    </nav>
  </header>

  <main class="contenedor-blanco">
    <div id="listaCarrito" class="carrito"></div>
    <h3 id="total" style="text-align: center;"></h3>

    <div class="acciones">
      <a href="index.html" class="boton">⬅ Volver al catálogo</a>
      <button class="boton" style="background-color: #c0392b;" onclick="vaciarCarrito()">❌ Vaciar carrito</button>
      <button class="boton" style="background-color: #27ae60;" onclick="finalizarCompra()">✅ Finalizar compra</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 MovilCenterStore</p>
  </footer>

  <script>
    function mostrarCarrito() {
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const contenedor = document.getElementById("listaCarrito");
      contenedor.innerHTML = "";

      if (carrito.length === 0) {
        contenedor.innerHTML = "<p style='text-align:center;'>Tu carrito está vacío.</p>";
        document.getElementById("total").textContent = "";
        return;
      }

      let total = 0;

      carrito.forEach((item) => {
        const subtotal = item.precio * item.cantidad;
        total += subtotal;

        contenedor.innerHTML += `
          <div class="producto-carrito">
            <img src="${item.imagen}" alt="${item.nombre}" />
            <div>
              <h3>${item.nombre}</h3>
              <p><strong>Precio:</strong> $${item.precio}</p>
              <p><strong>Cantidad:</strong> ${item.cantidad}</p>
              <p><strong>Subtotal:</strong> $${subtotal}</p>
              <button class="boton" onclick="restarUnidad(${item.id})">−</button>
              <button class="boton" onclick="aumentarUnidad(${item.id})">＋</button>
              <button class="boton" style="background-color: #e74c3c;" onclick="eliminarProducto(${item.id})">🗑️ Eliminar</button>
            </div>
          </div>
        `;
      });

      document.getElementById("total").textContent = `Total a pagar: $${total.toLocaleString()}`;
    }

    function restarUnidad(id) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const index = carrito.findIndex(item => item.id === id);
      if (index >= 0) {
        if (carrito[index].cantidad > 1) {
          carrito[index].cantidad -= 1;
        } else {
          carrito.splice(index, 1);
        }
        localStorage.setItem("carrito", JSON.stringify(carrito));
        mostrarCarrito();
        mostrarMenuUsuario();
      }
    }

    function aumentarUnidad(id) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const index = carrito.findIndex(item => item.id === id);
      if (index >= 0) {
        carrito[index].cantidad += 1;
        localStorage.setItem("carrito", JSON.stringify(carrito));
        mostrarCarrito();
        mostrarMenuUsuario();
      }
    }

    function eliminarProducto(id) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito = carrito.filter(item => item.id !== id);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      mostrarCarrito();
      mostrarMenuUsuario();
    }

    function vaciarCarrito() {
      localStorage.removeItem("carrito");
      mostrarCarrito();
      mostrarMenuUsuario();
    }

    function finalizarCompra() {
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      if (carrito.length === 0) {
        alert("Tu carrito está vacío.");
        return;
      }

      // Validar stock antes de comprar
      Promise.all(
        carrito.map(item =>
          fetch(`http://localhost:3000/api/productos/${item.id}`)
            .then(res => res.json())
            .then(prod => {
              if (item.cantidad > prod.stock) {
                throw new Error(`El producto "${prod.nombre}" solo tiene ${prod.stock} unidades disponibles.`);
              }
            })
        )
      )
      .then(() => {
        return fetch("http://localhost:3000/api/comprar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(carrito)
        });
      })
      .then(res => {
        if (!res.ok) return res.json().then(err => { throw new Error(err.error || "Error al procesar compra"); });
        return res.json();
      })
      .then(() => {
        alert("✅ Compra realizada con éxito.");
        localStorage.removeItem("carrito");
        mostrarCarrito();
        mostrarMenuUsuario();
      })
      .catch(err => {
        alert("❌ No se pudo realizar la compra:\n" + err.message);
      });
    }

    function mostrarMenuUsuario() {
      const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const totalProductos = carrito.reduce((total, item) => total + item.cantidad, 0);
      const carritoTexto = `Carrito 🛒${totalProductos > 0 ? ` (${totalProductos})` : ""}`;
      const menuUsuario = document.getElementById("menuUsuario");
      const menuOpciones = document.getElementById("menuOpciones");

      if (usuario) {
        menuOpciones.innerHTML = `<a href="carrito.html">${carritoTexto}</a>`;
        menuUsuario.innerHTML = `👤 ${usuario.nombre} | <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>`;
      } else {
        menuOpciones.innerHTML = "";
        menuUsuario.innerHTML = `<a href="registro.html">Registro / Iniciar sesión</a>`;
      }
    }

    function cerrarSesion() {
      localStorage.removeItem("usuarioLogueado");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
